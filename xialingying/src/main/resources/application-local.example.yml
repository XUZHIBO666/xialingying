# 本地开发配置模板
# 使用方法：复制此文件 → 粘贴并改名为 application-local.yml → 填入真实 Key
# application-local.yml 已在 .gitignore 中，不会提交到 Git

ai:
  memory:
    file: ./data/conversation-memory.json
  api:
    key: your-api-key-here
  image:
    api:
      key: your-image-api-key-here
      url: https://api.openai.com
    model: gpt-image-1
    size: 1024x1024
  vision:
    api:
      key: your-vision-api-key-here
      url: https://api.siliconflow.cn
    model: Qwen/Qwen3-VL-8B-Instruct
    prompt: 请用中文简洁描述这张图片的主要内容，如果图片中有文字也请读出来。
  voice:
    asr:
      api-key: your-siliconflow-api-key-here
      api-url: https://api.siliconflow.cn
      model: FunAudioLLM/SenseVoiceSmall
      timeout: 60s
    tts:
      api-key: your-siliconflow-api-key-here
      api-url: https://api.siliconflow.cn
      model: FunAudioLLM/CosyVoice2-0.5B
      voice: FunAudioLLM/CosyVoice2-0.5B:anna
      timeout: 60s
    audio:
      silk-decoder-path: E:/path/to/silk/decoder.exe
      silk-encoder-path: E:/path/to/silk/silk_v3_encoder.exe
      process-timeout: 30s




