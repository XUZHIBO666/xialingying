# ===========================================
# Weather CLI 配置文件
# ===========================================
# 使用方式: 将下方 your-api-key-here 替换为实际 Key
# 也可通过环境变量设置 (环境变量优先级更高)
# ===========================================

# --- DeepSeek API ---
# 申请地址: https://platform.deepseek.com/api_keys
# 环境变量: DEEPSEEK_API_KEY
deepseek.api.key=your-deepseek-api-key-here
deepseek.api.url=https://api.deepseek.com/v1/chat/completions
deepseek.model=deepseek-chat

# --- 通义千问 API ---
# 申请地址: https://dashscope.console.aliyun.com/apiKey
# 环境变量: QWEN_API_KEY
qwen.api.key=your-qwen-api-key-here
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
qwen.model=qwen-plus

# --- 默认使用的 AI 模型 ---
ai.default.provider=deepseek

# --- iLink 微信 Bot ---
# 协议文档: https://docs.openclaw.ai/zh-CN/channels/wechat
# Base URL: https://ilinkai.weixin.qq.com
ilink.api.baseurl=https://ilinkai.weixin.qq.com
ilink.bot.type=3
ilink.longpoll.timeout=30000
