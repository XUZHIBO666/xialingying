<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>iLink Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f2f5; min-height: 100vh; }
        .header { background: #07c160; color: #fff; padding: 16px 24px;
                  font-size: 20px; font-weight: 600; text-align: center; }
        .container { max-width: 700px; margin: 24px auto; padding: 0 16px; }

        /* 二维码区域 */
        .qr-box { background: #fff; border-radius: 12px; padding: 32px;
                  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .qr-box img { width: 240px; height: 240px; border: 2px solid #eee; border-radius: 8px; }
        .qr-box .placeholder { width: 240px; height: 240px; margin: 0 auto;
                               border: 2px dashed #ddd; border-radius: 8px;
                               display: flex; align-items: center; justify-content: center;
                               color: #999; font-size: 14px; text-align: center;
                               line-height: 1.6; }
        .status { margin-top: 16px; font-size: 15px; color: #555; }
        .status.logged-in { color: #07c160; font-weight: 600; }
        .btn-refresh { margin-top: 12px; background: #07c160; color: #fff; border: none;
                       border-radius: 8px; padding: 8px 24px; cursor: pointer; font-size: 14px; }
        .qr-link { margin-top: 8px; font-size: 12px; color: #999; word-break: break-all; }

        /* 消息区域 */
        .msg-box { background: #fff; border-radius: 12px; padding: 16px;
                   box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 16px;
                   max-height: 400px; overflow-y: auto; display: none; }
        .msg-item { padding: 8px 12px; margin: 4px 0; border-radius: 8px;
                    border-bottom: 1px solid #f5f5f5; }
        .msg-item .user { font-weight: 600; color: #07c160; margin-right: 8px; }
        .msg-item .time { font-size: 11px; color: #aaa; margin-left: 12px; }
        .msg-item .text { color: #333; }

        /* 回复区域 */
        .reply-box { background: #fff; border-radius: 12px; padding: 12px 16px;
                     box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 12px;
                     display: flex; gap: 8px; display: none; }
        .reply-box input { flex: 1; border: 1px solid #ddd; border-radius: 8px;
                           padding: 10px 12px; font-size: 14px; outline: none; }
        .reply-box input:focus { border-color: #07c160; }
        .reply-box button { background: #07c160; color: #fff; border: none;
                            border-radius: 8px; padding: 10px 20px; cursor: pointer;
                            font-size: 14px; font-weight: 600; white-space: nowrap; }
        .reply-box select { border: 1px solid #ddd; border-radius: 8px; padding: 8px;
                            font-size: 13px; max-width: 160px; }

        /* 日志 */
        .log-box { background: #1e1e1e; color: #0f0; border-radius: 12px; padding: 12px 16px;
                   font-family: 'Courier New', monospace; font-size: 12px;
                   max-height: 150px; overflow-y: auto; margin-top: 12px; }
    </style>
</head>
<body>

<div class="header">iLink Bot</div>

<div class="container">

    <!-- 二维码区域 -->
    <div class="qr-box" id="qrBox">
        <div id="qrPlaceholder" class="placeholder">正在获取二维码...</div>
        <img id="qrImage" src="" alt="QR Code" style="display:none">
        <div id="qrLink" class="qr-link" style="display:none"></div>
        <div class="status" id="statusText">正在获取二维码...</div>
        <button class="btn-refresh" onclick="restartLogin()">重新获取二维码</button>
    </div>

    <!-- 消息列表 -->
    <div class="msg-box" id="msgBox">
        <div id="msgList"></div>
    </div>

    <!-- 回复 -->
    <div class="reply-box" id="replyBox">
        <select id="userSelect">
            <option value="">选择回复对象</option>
        </select>
        <input id="replyInput" type="text" placeholder="输入回复内容...（回车发送）"
               onkeypress="if(event.key==='Enter')sendReply()">
        <button onclick="sendReply()">发送</button>
    </div>

    <!-- 日志 -->
    <div class="log-box" id="logBox"></div>

</div>

<script>
    let knownUsers = {};
    let loggedIn = false;

    // ===== 拉取状态 =====
    function pollStatus() {
        fetch('/bot/status')
            .then(r => r.json())
            .then(data => {
                loggedIn = data.loggedIn;
                let statusEl = document.getElementById('statusText');
                statusEl.textContent = data.status;

                if (data.loggedIn) {
                    statusEl.classList.add('logged-in');
                    document.getElementById('qrBox').style.display = 'none';
                } else {
                    statusEl.classList.remove('logged-in');

                    // 显示二维码
                    if (data.qrCodeBase64 && data.qrCodeBase64.length > 10) {
                        document.getElementById('qrPlaceholder').style.display = 'none';
                        let img = document.getElementById('qrImage');
                        img.src = 'data:image/png;base64,' + data.qrCodeBase64;
                        img.style.display = 'inline-block';
                    }

                    // 显示二维码链接
                    if (data.qrCodeUrl) {
                        let link = document.getElementById('qrLink');
                        link.textContent = '链接: ' + data.qrCodeUrl;
                        link.style.display = 'block';
                    }
                }
            });
    }

    // ===== 拉取消息 =====
    function pollMessages() {
        fetch('/bot/messages')
            .then(r => r.json())
            .then(data => {
                if (loggedIn) {
                    document.getElementById('msgBox').style.display = 'block';
                    document.getElementById('replyBox').style.display = 'flex';
                }

                if (data.messages && data.messages.length > 0) {
                    let msgList = document.getElementById('msgList');
                    data.messages.forEach(m => {
                        knownUsers[m.replyId] = { userId: m.fromUser, replyId: m.replyId };
                        let t = new Date(m.time).toLocaleTimeString();
                        let item = document.createElement('div');
                        item.className = 'msg-item';

                        let user = document.createElement('span');
                        user.className = 'user';
                        user.textContent = m.fromUser;

                        let text = document.createElement('span');
                        text.className = 'text';
                        text.textContent = m.content;

                        let time = document.createElement('span');
                        time.className = 'time';
                        time.textContent = t;

                        item.appendChild(user);
                        item.appendChild(text);
                        item.appendChild(time);
                        msgList.appendChild(item);
                    });
                    document.getElementById('msgBox').scrollTop = document.getElementById('msgBox').scrollHeight;
                    updateUserSelect();
                }

                if (data.logs) {
                    let logBox = document.getElementById('logBox');
                    logBox.replaceChildren();
                    data.logs.forEach(l => {
                        let line = document.createElement('div');
                        line.textContent = '> ' + l;
                        logBox.appendChild(line);
                    });
                    logBox.scrollTop = logBox.scrollHeight;
                }
            });
    }

    function updateUserSelect() {
        let sel = document.getElementById('userSelect');
        let current = sel.value;
        sel.replaceChildren();
        let placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '选择回复对象';
        sel.appendChild(placeholder);
        Object.values(knownUsers).forEach(u => {
            let option = document.createElement('option');
            option.value = u.replyId;
            option.textContent = u.userId;
            sel.appendChild(option);
        });
        if (current) sel.value = current;
    }

    function sendReply() {
        let replyId = document.getElementById('userSelect').value;
        let text = document.getElementById('replyInput').value.trim();
        if (!replyId || !text) return;

        let formData = new URLSearchParams();
        formData.append('replyId', replyId);
        formData.append('text', text);

        fetch('/bot/send', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.ok) document.getElementById('replyInput').value = '';
            });
    }

    function restartLogin() {
        fetch('/bot/restart', { method: 'POST' })
            .then(() => {
                document.getElementById('qrPlaceholder').style.display = 'flex';
                document.getElementById('qrImage').style.display = 'none';
                document.getElementById('qrLink').style.display = 'none';
                document.getElementById('statusText').textContent = '正在重新获取...';
                document.getElementById('msgList').replaceChildren();
                loggedIn = false;
                document.getElementById('msgBox').style.display = 'none';
                document.getElementById('replyBox').style.display = 'none';
                knownUsers = {};
            });
    }

    // 轮询
    setInterval(pollStatus, 2000);
    setInterval(pollMessages, 1500);
    pollStatus();
    pollMessages();
</script>

</body>
</html>
