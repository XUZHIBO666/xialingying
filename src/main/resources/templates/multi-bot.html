<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>iLink Bot - 多账号管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #07c160 0%, #05a350 100%);
                  color: #fff; padding: 20px 24px; font-size: 22px; font-weight: 600;
                  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

        /* Bot卡片网格 */
        .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                     gap: 20px; margin-bottom: 24px; }

        .bot-card { background: #fff; border-radius: 12px; padding: 20px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .bot-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

        .bot-header { display: flex; justify-content: space-between; align-items: center;
                      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .bot-title { font-size: 18px; font-weight: 600; color: #333; }
        .bot-id { font-size: 12px; color: #999; margin-top: 4px; }

        .bot-status { font-size: 14px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .bot-status.logged-in { background: #e6f7ed; color: #07c160; }
        .bot-status.waiting { background: #fff7e6; color: #faad14; }
        .bot-status.error { background: #fff1f0; color: #ff4d4f; }

        .qr-section { text-align: center; margin: 16px 0; }
        .qr-section img { width: 200px; height: 200px; border: 2px solid #eee; border-radius: 8px; }
        .qr-placeholder { width: 200px; height: 200px; margin: 0 auto;
                         border: 2px dashed #ddd; border-radius: 8px;
                         display: flex; align-items: center; justify-content: center;
                         color: #999; font-size: 13px; }

        .bot-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 8px 16px; border: none; border-radius: 8px;
               cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #07c160; color: #fff; }
        .btn-primary:hover { background: #05a350; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-danger:hover { background: #ff7875; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }

        /* 创建新Bot区域 */
        .create-bot-section { background: #fff; border-radius: 12px; padding: 24px;
                              box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
                              text-align: center; }
        .create-bot-input { width: 300px; padding: 10px 16px; border: 2px solid #ddd;
                           border-radius: 8px; font-size: 14px; margin-right: 12px; outline: none; }
        .create-bot-input:focus { border-color: #07c160; }

        /* 消息区域 */
        .msg-section { background: #fff; border-radius: 12px; padding: 20px;
                       box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .msg-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #333; }
        .msg-list { max-height: 400px; overflow-y: auto; }
        .msg-item { padding: 12px; margin: 8px 0; border-radius: 8px; background: #f9f9f9;
                   border-left: 4px solid #07c160; }
        .msg-user { font-weight: 600; color: #07c160; margin-bottom: 4px; }
        .msg-text { color: #333; line-height: 1.5; }
        .msg-time { font-size: 11px; color: #aaa; margin-top: 4px; }

        /* 回复区域 */
        .reply-section { background: #fff; border-radius: 12px; padding: 16px;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; gap: 12px; }
        .reply-select { width: 200px; padding: 10px; border: 1px solid #ddd;
                       border-radius: 8px; font-size: 14px; }
        .reply-input { flex: 1; padding: 10px 16px; border: 1px solid #ddd;
                      border-radius: 8px; font-size: 14px; outline: none; }
        .reply-input:focus { border-color: #07c160; }

        /* 日志区域 */
        .log-section { background: #1e1e1e; border-radius: 12px; padding: 16px;
                      font-family: 'Courier New', monospace; font-size: 12px;
                      max-height: 200px; overflow-y: auto; margin-top: 24px; }
        .log-line { color: #0f0; margin: 2px 0; }

        /* 统计信息 */
        .stats-bar { background: #fff; border-radius: 12px; padding: 16px 24px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
                    display: flex; justify-content: space-around; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: #07c160; }
        .stat-label { font-size: 13px; color: #999; margin-top: 4px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">🤖 iLink Bot - 多账号管理中心</div>

<div class="container">

    <!-- 统计栏 -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="totalBots">0</div>
            <div class="stat-label">总Bot数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="loggedInBots">0</div>
            <div class="stat-label">已登录</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="waitingBots">0</div>
            <div class="stat-label">待扫码</div>
        </div>
    </div>

    <!-- 创建新Bot -->
    <div class="create-bot-section">
        <h3 style="margin-bottom: 16px; color: #333;"> 添加新Bot实例</h3>
        <input type="text" class="create-bot-input" id="newBotName" placeholder="输入Bot名称（可选）">
        <button class="btn btn-primary" onclick="createBot()">创建Bot</button>
        <button class="btn btn-secondary" onclick="startAllBots()" style="margin-left: 12px;">启动所有未登录Bot</button>
    </div>

    <!-- Bot卡片网格 -->
    <div class="bots-grid" id="botsGrid">
        <!-- 动态生成Bot卡片 -->
    </div>

    <!-- 消息列表 -->
    <div class="msg-section hidden" id="msgSection">
        <div class="msg-header">💬 最近消息</div>
        <div class="msg-list" id="msgList"></div>
    </div>

    <!-- 回复区域 -->
    <div class="reply-section hidden" id="replySection">
        <select class="reply-select" id="userSelect">
            <option value="">选择回复对象</option>
        </select>
        <input class="reply-input" id="replyInput" type="text"
               placeholder="输入回复内容...（回车发送）"
               onkeypress="if(event.key==='Enter')sendReply()">
        <button class="btn btn-primary" onclick="sendReply()">发送</button>
    </div>

    <!-- 日志 -->
    <div class="log-section" id="logBox"></div>

</div>

<script>
    let botsData = {};
    let knownUsers = {};
    let selectedBotId = null;

    // ===== 加载Bot列表 =====
    function loadBots() {
        fetch('/bot/instances')
            .then(r => r.json())
            .then(bots => {
                botsData = {};
                bots.forEach(bot => {
                    botsData[bot.instanceId] = bot;
                });
                renderBots();
                updateStats();
            });
    }

    // ===== 渲染Bot卡片 =====
    function renderBots() {
        const grid = document.getElementById('botsGrid');
        grid.innerHTML = '';

        Object.values(botsData).forEach(bot => {
            const card = document.createElement('div');
            card.className = 'bot-card';

            const statusClass = bot.loggedIn ? 'logged-in' : (bot.status.includes('错误') ? 'error' : 'waiting');
            const statusText = bot.loggedIn ? '✅ 已登录' : '⏳ 等待扫码';

            card.innerHTML = `
                <div class="bot-header">
                    <div>
                        <div class="bot-title">${bot.displayName || bot.instanceId}</div>
                        <div class="bot-id">${bot.instanceId}</div>
                    </div>
                    <span class="bot-status ${statusClass}">${statusText}</span>
                </div>

                <div class="qr-section" id="qr-${bot.instanceId}">
                    ${!bot.loggedIn ? `
                        <div class="qr-placeholder" id="placeholder-${bot.instanceId}">正在获取二维码...</div>
                        <img id="qrcode-${bot.instanceId}" src="" alt="QR Code" style="display:none">
                    ` : '<div style="color: #07c160; padding: 20px;">Bot已就绪，可以接收消息</div>'}
                </div>

                <div style="font-size: 13px; color: #666; margin: 8px 0;" id="status-${bot.instanceId}">
                    ${bot.status}
                </div>

                <div class="bot-actions">
                    ${!bot.loggedIn ? `
                        <button class="btn btn-primary" onclick="refreshQr('${bot.instanceId}')">刷新二维码</button>
                    ` : ''}
                    <button class="btn btn-secondary" onclick="viewMessages('${bot.instanceId}')">查看消息</button>
                    <button class="btn btn-danger" onclick="removeBot('${bot.instanceId}')">删除Bot</button>
                </div>
            `;

            grid.appendChild(card);

            if (!bot.loggedIn) {
                fetchBotQr(bot.instanceId);
            }
        });
    }

    // ===== 获取单个Bot的二维码 =====
    function fetchBotQr(botId) {
        fetch(`/bot/status?botId=${botId}`)
            .then(r => r.json())
            .then(data => {
                if (!data.loggedIn && data.qrCodeBase64) {
                    const placeholder = document.getElementById(`placeholder-${botId}`);
                    const qrcode = document.getElementById(`qrcode-${botId}`);

                    if (placeholder && qrcode) {
                        placeholder.style.display = 'none';
                        qrcode.src = 'data:image/png;base64,' + data.qrCodeBase64;
                        qrcode.style.display = 'inline-block';
                    }

                    const statusEl = document.getElementById(`status-${botId}`);
                    if (statusEl) {
                        statusEl.textContent = data.status;
                    }
                }
            });
    }

    // ===== 刷新二维码 =====
    function refreshQr(botId) {
        fetch(`/bot/restart?botId=${botId}`, { method: 'POST' })
            .then(() => {
                const placeholder = document.getElementById(`placeholder-${botId}`);
                const qrcode = document.getElementById(`qrcode-${botId}`);

                if (placeholder) {
                    placeholder.style.display = 'flex';
                    placeholder.textContent = '正在重新获取...';
                }
                if (qrcode) {
                    qrcode.style.display = 'none';
                }

                setTimeout(() => fetchBotQr(botId), 2000);
            });
    }

    // ===== 创建新Bot =====
    function createBot() {
        const name = document.getElementById('newBotName').value.trim();
        const formData = new URLSearchParams();
        if (name) formData.append('displayName', name);

        fetch('/bot/instances', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById('newBotName').value = '';
                    loadBots();
                    alert(`Bot创建成功: ${data.instanceId}`);
                }
            });
    }

    // ===== 删除Bot =====
    function removeBot(botId) {
        if (!confirm(`确定要删除 ${botId} 吗？`)) return;

        fetch(`/bot/instances/${botId}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(() => {
                delete botsData[botId];
                loadBots();
            });
    }

    // ===== 启动所有Bot =====
    function startAllBots() {
        fetch('/bot/start-all', { method: 'POST' })
            .then(() => {
                alert('已请求启动所有未登录的Bot');
                setTimeout(loadBots, 2000);
            });
    }

    // ===== 更新统计 =====
    function updateStats() {
        const total = Object.keys(botsData).length;
        const loggedIn = Object.values(botsData).filter(b => b.loggedIn).length;
        const waiting = total - loggedIn;

        document.getElementById('totalBots').textContent = total;
        document.getElementById('loggedInBots').textContent = loggedIn;
        document.getElementById('waitingBots').textContent = waiting;
    }

    // ===== 查看消息 =====
    function viewMessages(botId) {
        selectedBotId = botId;

        fetch(`/bot/messages?botId=${botId}`)
            .then(r => r.json())
            .then(data => {
                const msgSection = document.getElementById('msgSection');
                const replySection = document.getElementById('replySection');
                const msgList = document.getElementById('msgList');

                msgSection.classList.remove('hidden');
                replySection.classList.remove('hidden');

                msgList.innerHTML = '';
                knownUsers = {};

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(m => {
                        knownUsers[m.replyId] = { userId: m.fromUser, replyId: m.replyId };

                        const item = document.createElement('div');
                        item.className = 'msg-item';
                        item.innerHTML = `
                            <div class="msg-user">${m.fromUser}</div>
                            <div class="msg-text">${m.content}</div>
                            <div class="msg-time">${new Date(m.time).toLocaleString()}</div>
                        `;
                        msgList.appendChild(item);
                    });

                    updateUserSelect();
                    msgList.scrollTop = msgList.scrollHeight;
                } else {
                    msgList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无消息</div>';
                }

                if (data.logs) {
                    const logBox = document.getElementById('logBox');
                    logBox.innerHTML = '';
                    data.logs.forEach(log => {
                        const line = document.createElement('div');
                        line.className = 'log-line';
                        line.textContent = '> ' + log;
                        logBox.appendChild(line);
                    });
                    logBox.scrollTop = logBox.scrollHeight;
                }
            });
    }

    function updateUserSelect() {
        const sel = document.getElementById('userSelect');
        const current = sel.value;
        sel.innerHTML = '<option value="">选择回复对象</option>';

        Object.values(knownUsers).forEach(u => {
            const option = document.createElement('option');
            option.value = u.replyId;
            option.textContent = u.userId;
            sel.appendChild(option);
        });

        if (current) sel.value = current;
    }

    function sendReply() {
        if (!selectedBotId) return;

        const replyId = document.getElementById('userSelect').value;
        const text = document.getElementById('replyInput').value.trim();

        if (!replyId || !text) return;

        const formData = new URLSearchParams();
        formData.append('replyId', replyId);
        formData.append('text', text);
        formData.append('botId', selectedBotId);

        fetch('/bot/send', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById('replyInput').value = '';
                    alert('发送成功');
                } else {
                    alert('发送失败');
                }
            });
    }

    // ===== 轮询更新 =====
    setInterval(() => {
        loadBots();
        if (selectedBotId) {
            viewMessages(selectedBotId);
        }
    }, 3000);

    // 初始加载
    loadBots();
</script>

</body>
</html>
